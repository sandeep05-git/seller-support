<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoQuickSupp | Grow Your Ecommerce</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#020617;color:#fff;}
nav{position:fixed;width:100%;top:0;background:#020617;padding:10px;text-align:center;z-index:1000;}
nav a{color:#fff;margin:0 10px;text-decoration:none;}

.hero{height:100vh;display:flex;align-items:center;justify-content:center;background:url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d') center/cover no-repeat;}
.hero h1{text-align:center;font-size:38px;}

.button{background:#22c55e;padding:12px 25px;border-radius:25px;color:#fff;text-decoration:none;margin:10px;display:inline-block;border:none;cursor:pointer;}

section{padding:60px 20px;text-align:center;}
.flex{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;}
.card{background:#1e293b;padding:20px;border-radius:10px;width:220px;}

form{max-width:350px;margin:auto;}
input,textarea{width:100%;padding:10px;margin:8px 0;border-radius:5px;border:none;}

.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;padding:12px;border-radius:50px;color:#fff;text-decoration:none;}

/* LOGO SLIDER */
.logo-slider{overflow:hidden;width:100%;margin-top:30px;}
.logo-track{display:flex;gap:40px;animation:scroll 25s linear infinite;align-items:center;}
.logo-track img{height:50px;object-fit:contain;background:#fff;padding:5px;border-radius:6px;}
@keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

/* POPUP */
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:9999;}
.popup-box{background:#fff;color:#000;padding:20px;border-radius:10px;text-align:center;width:300px;}
.close-btn{background:red;color:#fff;padding:8px;border:none;margin-top:10px;cursor:pointer;}

.success-msg{color:lightgreen;margin-top:10px;}

.sticky-bar{position:fixed;bottom:0;width:100%;background:#22c55e;padding:10px;text-align:center;color:#000;}
</style>

</head>

<body>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h3>🚀 Free Ecommerce Guide</h3>
<p>Only <span id="slots">10</span> slots left today</p>
<input type="email" id="popupEmail" placeholder="Enter Email">
<button class="button" onclick="saveLead()">Get Free</button>
<div id="popupMsg" class="success-msg"></div>
<button class="close-btn" onclick="closePopup()">Skip</button>
</div>
</div>

<nav>
<a href="#">Home</a>
<a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>Start & Scale Your Online sells Business 💰</h1>
<a href="#contact" class="button">Get Free Help</a>
</div>
</section>

<!-- LOGO SLIDER -->
<section>
<h2 style="color:#38bdf8;">We Support All Major Platforms</h2>
<div class="logo-slider">
<div class="logo-track">

<div class="logo-track">

<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon">

<img src="images/flipkart.png">
<img src="images/meesho.png">
<img src="images/zepto.png">
<img src="images/myntra.png">
<img src="images/blinkit.png">
<img src="images/meesho 2025-05-31 at 1.16.44 PM.jpeg">

</div>
</div>
</div>
</section>

<!-- SERVICES -->
<section>
<h2>Services</h2>
<div class="flex">
<div class="card">Account Setup</div>
<div class="card">Product Listing</div>
<div class="card">Growth</div>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>Get Consultation</h2>

<form id="contact-form" action="https://formspree.io/f/xqaqpyjv" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Your Goal"></textarea>
<button type="submit" class="button">Submit</button>
<div id="formMsg" class="success-msg"></div>
</form>

</section>

<!-- STICKY BAR -->
<div class="sticky-bar">
🚀 Need Help? <a href="https://wa.me/918148587929" style="color:#000;font-weight:bold;">Chat on WhatsApp</a>
</div>

<a href="https://wa.me/918148587929" class="whatsapp">Chat</a>

<script>
document.addEventListener("DOMContentLoaded", function(){

let popup = document.getElementById("popup");
let popupShown = false;

// Popup delay
setTimeout(()=>{
if(!popupShown){
popup.style.display = "flex";
popupShown = true;
}
},5000);

window.closePopup = function(){
popup.style.display = "none";
}

// Popup form submit
window.saveLead = function(){
let email = document.getElementById("popupEmail").value;

if(email){
fetch("https://formspree.io/f/xqaqpyjv", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({ email: email, source: "Popup" })
})
.then(()=>{
document.getElementById("popupMsg").innerText = "✅ Sent successfully!";
setTimeout(()=>popup.style.display="none",2000);
})
.catch(()=>{
document.getElementById("popupMsg").innerText = "❌ Error. Try again.";
});
}
}

// Exit intent
document.addEventListener("mouseout", function(e){
if(e.clientY < 10 && !popupShown){
popup.style.display = "flex";
popupShown = true;
}
});

// Counter
let count = 10;
setInterval(()=>{
if(count > 3){
count--;
document.getElementById("slots").innerText = count;
}
},4000);

// Contact form AJAX
document.getElementById("contact-form").addEventListener("submit", function(e){
e.preventDefault();

let form = this;
let data = new FormData(form);

fetch(form.action, {
method: "POST",
body: data,
headers: { 'Accept': 'application/json' }
})
.then(()=>{
document.getElementById("formMsg").innerText = "✅ Submitted successfully!";
form.reset();
})
.catch(()=>{
document.getElementById("formMsg").innerText = "❌ Error submitting form";
});
});

});
</script>

</body>
</html>
