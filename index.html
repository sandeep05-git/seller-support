<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoQuickSupp</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins;
background:#020617;
color:#fff;
overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:fixed;
width:600px;height:600px;
background:radial-gradient(circle,#22c55e,transparent);
top:-100px;left:-100px;
filter:blur(120px);
z-index:-1;
}

/* NAV */
nav{
position:fixed;width:100%;
display:flex;justify-content:space-between;
padding:20px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(15px);
z-index:1000;
}

.menu{display:flex;gap:20px;}
.menu a{color:#fff;text-decoration:none;}

.hamburger{display:none;}

/* HERO */
.hero{
min-height:90vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:38px;
font-weight:700;
line-height:1.3;
}

.hero span{
background:linear-gradient(90deg,#22c55e,#4ade80);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:10px;
opacity:0.8;
}

.btn{
margin-top:25px;
padding:14px 30px;
border-radius:30px;
background:#22c55e;
color:#000;
text-decoration:none;
font-weight:600;
}

/* SECTION */
section{
padding:70px 20px;
text-align:center;
}

/* GLASS CARD */
.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
width:260px;
transition:0.3s;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.flex{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

/* SERVICES IMAGE */
.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

/* CONTACT */
.box{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:15px;
max-width:350px;
margin:auto;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

/* MOBILE */
@media(max-width:768px){
.menu{display:none;}
.hamburger{display:block;}
.hero h1{font-size:28px;}
}
</style>
</head>

<body>

<nav>
<div><b>EcoQuickSupp</b></div>
<div class="menu">
<a href="#">Home</a>
<a href="#services">Services</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Launch & Grow Your <span>Online Business</span> 🚀</h1>
<p>Amazon • Flipkart • Meesho support from Chennai</p>
<a href="#contact" class="btn">Start Now</a>
</section>

<!-- TRUST -->
<section>
<h2>Why Choose Us</h2>
<div class="flex">
<div class="card"><h3>50+</h3><p>Clients</p></div>
<div class="card"><h3>Fast</h3><p>Support</p></div>
<div class="card"><h3>Real</h3><p>Experts</p></div>
</div>
</section>

<!-- SERVICES -->
<section id="services">
<h2>Services</h2>
<div class="flex">

<div class="card">
<img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d">
<p>Account Setup</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1586880244406-556ebe35f282">
<p>Product Listing</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1533750349088-cd871a92f312">
<p>Marketing</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71">
<p>Growth Strategy</p>
</div>

</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>Contact</h2>

<div class="box">
<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
<input name="name" placeholder="Name" required>
<input name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>
<button class="btn">Submit</button>
</form>
</div>

</section>

</body>
</html>
