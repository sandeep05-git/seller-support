<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoQuickSupp | Grow Your Ecommerce</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#020617;color:#fff;}

/* NAV */
nav{
position:fixed;width:100%;top:0;
background:rgba(2,6,23,0.7);
backdrop-filter:blur(10px);
padding:12px;text-align:center;z-index:1000;
}
nav a{color:#fff;margin:0 10px;text-decoration:none;font-size:15px;}

/* HERO */
.hero{
position:relative;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d') center/cover no-repeat;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to bottom, rgba(2,6,23,0.8), rgba(2,6,23,0.95));
}

.hero div{
position:relative;
z-index:1;
padding:20px;
}

.hero h1{
font-size:42px;
line-height:1.3;
}

/* BUTTON */
.button{
background:linear-gradient(135deg,#22c55e,#16a34a);
padding:12px 25px;
border-radius:30px;
color:#fff;
text-decoration:none;
display:inline-block;
box-shadow:0 4px 15px rgba(34,197,94,0.4);
transition:0.3s;
border:none;
}
.button:hover{
transform:translateY(-2px);
box-shadow:0 6px 20px rgba(34,197,94,0.6);
}

/* SECTIONS */
section{padding:60px 20px;text-align:center;}
.flex{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;}

/* CARDS */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:15px;
padding:20px;
width:220px;
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
}
.card:hover{transform:translateY(-5px);}

/* FORM */
form{max-width:350px;margin:auto;}
input,textarea{
width:100%;padding:10px;margin:8px 0;
border-radius:5px;border:none;
}

/* LOGOS */
.logo-track{
display:flex;gap:20px;overflow:auto;
}
.logo-track img{
height:40px;background:#fff;padding:5px;border-radius:6px;
}

/* POPUP */
.popup{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;justify-content:center;align-items:center;z-index:9999;
}
.popup-box{
background:#fff;color:#000;padding:20px;border-radius:10px;text-align:center;width:300px;
}
.close-btn{
background:red;color:#fff;padding:8px;border:none;margin-top:10px;
}

/* STICKY */
.sticky-bar{
position:fixed;bottom:0;width:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
padding:12px;text-align:center;color:#000;font-weight:600;
}

/* WHATSAPP */
.whatsapp{
position:fixed;bottom:70px;right:20px;
background:#25D366;padding:12px;border-radius:50%;
color:#fff;text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){

.hero{min-height:80vh;}

.hero h1{font-size:24px;}

.button{
width:100%;
max-width:250px;
}

.card{width:90%;}

.logo-track img{height:30px;}

}
</style>
</head>

<body>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h3>🚀 Free Ecommerce Guide</h3>
<p>Limited slots today</p>
<input type="email" id="popupEmail" placeholder="Enter Email">
<button class="button" onclick="saveLead()">Get Free</button>
<div id="popupMsg"></div>
<button class="close-btn" onclick="closePopup()">Skip</button>
</div>
</div>

<!-- NAV -->
<nav>
<a href="#">Home</a>
<a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>Start & Scale Your Online Business 💰</h1>
<a href="#contact" class="button">Get Free Help</a>
</div>
</section>

<!-- LOGOS -->
<section>
<h2>Platforms We Support</h2>
Amazon
  Flipkart
  Meesho
  Zepto
</div>
</section>

<!-- SERVICES -->
<section>
<h2>Services</h2>
<div class="flex">
<div class="card">Account Setup</div>
<div class="card">Product Listing</div>
<div class="card">Growth</div>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2>Get Consultation</h2>

<form id="contact-form" action="https://formspree.io/f/xqaqpyjv" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Your Goal"></textarea>
<button type="submit" class="button">Submit</button>
<div id="formMsg"></div>
</form>

</section>

<!-- STICKY -->
<div class="sticky-bar">
Need Help? <a href="https://wa.me/918148587929" style="color:#000;">Chat on WhatsApp</a>
</div>

<a href="https://wa.me/918148587929?text=Hi%20I%20need%20help%20with%20ecommerce" class="whatsapp">💬</a>

<script>
let popup=document.getElementById("popup");

setTimeout(()=>popup.style.display="flex",5000);

function closePopup(){
popup.style.display="none";
}

function saveLead(){
let email=document.getElementById("popupEmail").value;

if(email){
fetch("https://formspree.io/f/xqaqpyjv",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email:email})
})
.then(()=>{
document.getElementById("popupMsg").innerText="✅ Sent!";
setTimeout(()=>popup.style.display="none",2000);
});
}
}

/* FORM AJAX */
document.getElementById("contact-form").addEventListener("submit",function(e){
e.preventDefault();

let form=this;
let data=new FormData(form);

fetch(form.action,{
method:"POST",
body:data,
headers:{'Accept':'application/json'}
})
.then(()=>{
document.getElementById("formMsg").innerText="✅ Submitted!";
form.reset();
});
});
</script>

</body>
</html>
