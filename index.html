<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoQuickSupp | Grow Your Ecommerce sells</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Poppins;background:#020617;color:#fff;}
nav{position:fixed;width:100%;top:0;background:#020617;padding:10px;text-align:center;}
nav a{color:#fff;margin:0 10px;text-decoration:none;}

.hero{height:100vh;display:flex;align-items:center;justify-content:center;background:url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d') center/cover;}
.hero h1{font-size:40px;}

.button{background:#22c55e;padding:12px 25px;border-radius:25px;color:#fff;text-decoration:none;display:inline-block;margin:10px;}

section{padding:60px 20px;text-align:center;}
.flex{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;}
.card{background:#1e293b;padding:20px;border-radius:10px;width:220px;}

form{max-width:350px;margin:auto;}
input,textarea{width:100%;padding:10px;margin:8px 0;border-radius:5px;border:none;}

.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;padding:12px;border-radius:50px;color:#fff;text-decoration:none;}

/* POPUP */
.popup{position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;}
.popup-box{background:#fff;color:#000;padding:20px;border-radius:10px;text-align:center;width:300px;}

.sticky-bar{position:fixed;bottom:0;width:100%;background:#22c55e;padding:10px;text-align:center;}
</style>

</head>

<body>

<!-- ENTRY POPUP -->

<script>
let popupShown = true; // already shown at start

function closePopup(){
  document.getElementById('popup').style.display='none';
  popupShown = false; // stop reopening
}

function saveLead(){
  let email = document.getElementById('email').value;
  if(email){
    alert("Thanks! We will contact you.");
    closePopup();
  }
}

// EXIT INTENT (ONLY ONCE)
document.addEventListener("mouseout", function(e){
  if(e.clientY < 10 && !popupShown){
    document.getElementById('popup').style.display='flex';
    popupShown = true;
  }
});
</script>

<nav>
<a href="#">Home</a>
<a href="#contact">Contact</a>
</nav>

<section class="hero">
<div>
<h1>Start & Scale Your Online Business 💰</h1>
<a href="#contact" class="button">Get Free Help</a>
</div>
</section>

<section>
<h2>Services</h2>
<div class="flex">
<div class="card">Setup</div>
<div class="card">Listing</div>
<div class="card">Growth</div>
</div>
</section>

<section id="contact">
<h2>Get Consultation</h2>
<form action="https://formspree.io/f/xqaqpyjv" method="POST">
<input type="text" placeholder="Name" required>
<input type="email" placeholder="Email" required>
<textarea placeholder="Your Goal"></textarea>
<button class="button">Submit</button>
</form>
</section>

<!-- STICKY CTA -->

<div class="sticky-bar">
🚀 Need Help? <a href="https://wa.me/918148587929" style="color:#000;font-weight:bold;">Chat on WhatsApp</a>
</div>

<a href="https://wa.me/918148587929" class="whatsapp">Chat</a>
<script>
let popupShown = false;

// DELAY POPUP
setTimeout(() => {
  if(!popupShown){
    document.getElementById('popup').style.display='flex';
    popupShown = true;
  }
}, 5000);

// CLOSE
function closePopup(){
  document.getElementById('popup').style.display='none';
}

// SAVE LEAD
function saveLead(){
  let email = document.getElementById('email').value;
  if(email){
    alert("Guide will be sent to your email!");
    closePopup();
  }
}

// EXIT INTENT
document.addEventListener("mouseout", function(e){
  if(e.clientY < 10 && !popupShown){
    document.getElementById('popup').style.display='flex';
    popupShown = true;
  }
});

// FAKE SLOT COUNTER (decreases randomly)
let count = 10;
setInterval(()=>{
  if(count > 3){
    count--;
    document.getElementById('slots').innerText = count;
  }
}, 4000);
</script>

</body>
</html>
