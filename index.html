<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoQuickSupp</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Poppins;background:#020617;color:#fff;overflow-x:hidden;}

/* POPUP */
.popup{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:flex;justify-content:center;align-items:center;
z-index:3000;
}
.popup-box{
background:#0f172a;padding:30px;border-radius:15px;text-align:center;width:300px;
}
.popup input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;}
.popup button{padding:10px 20px;border:none;background:#4ade80;border-radius:20px;cursor:pointer;}

/* NAV */
nav{position:fixed;width:100%;top:0;display:flex;justify-content:space-between;padding:15px 20px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);z-index:1000;}

/* HERO */
.hero{
min-height:100vh;
display:flex;align-items:center;justify-content:center;text-align:center;
background:url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d') center/cover no-repeat;
}
.hero::before{content:"";position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.7);top:0;left:0;}
.hero-content{position:relative;z-index:1;}

/* TEXT ANIMATION */
.animated-text{
animation:fadeUp 2s ease infinite alternate;
}
@keyframes fadeUp{
0%{transform:translateY(0);opacity:0.7;}
100%{transform:translateY(-10px);opacity:1;}
}

.btn{margin-top:20px;padding:12px 25px;background:#4ade80;border-radius:30px;color:#000;text-decoration:none;display:inline-block;}

/* FLOATING IMAGES */
.float-img{
position:absolute;
width:80px;
animation:float 6s infinite ease-in-out;
}
@keyframes float{
0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);} }

.img1{top:20%;left:10%;}
.img2{top:60%;right:10%;}

/* SECTION */
section{padding:80px 20px;text-align:center;}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:80px;
right:20px;
background:#25D366;
padding:14px;
border-radius:50%;
z-index:2000;
}

/* CALL */
.call-btn{position:fixed;bottom:150px;right:20px;background:#4ade80;padding:10px 15px;border-radius:20px;color:#000;text-decoration:none;}

</style>
</head>

<body>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-box">
<h3>Get Free Tips 🚀</h3>
<input type="email" placeholder="Enter Email">
<button onclick="closePopup()">Continue</button>
</div>
</div>

<nav>
<div>EcoQuickSupp</div>
</nav>

<section class="hero">
<div class="hero-content">
<h1 class="animated-text">Grow Your Ecommerce Business 🚀</h1>
<p class="animated-text">Scale faster with expert support</p>
<a href="#" class="btn">Get Started</a>
</div>

<img src="https://cdn-icons-png.flaticon.com/512/263/263115.png" class="float-img img1">
<img src="https://cdn-icons-png.flaticon.com/512/891/891462.png" class="float-img img2">

</section>

<section>
<h2>Our Services</h2>
<p>Account setup, product listing, growth strategies</p>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/918148587929?text=Hi" class="whatsapp">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="30">
</a>

<a href="tel:918148587929" class="call-btn">📞 Call</a>

<script>
function closePopup(){
document.getElementById('popup').style.display='none';
}
</script>

</body>
</html>
